<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>leads profile</title>

<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/ayytrix/thisshitscrazyy/refs/heads/main/assets/icons/profilepicture.png">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;
}

/* ✅ BLURRED BACKGROUND IMAGE */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("https://raw.githubusercontent.com/ayytrix/thisshitscrazyy/refs/heads/main/assets/bg/atnight.png") center/cover no-repeat;
    filter: blur(12px) brightness(0.6);
    transform: scale(1.1);
    z-index: 0;
}

/* ENTER SCREEN */
#enterScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(18px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    cursor: pointer;
    z-index: 999;
    transition: 0.8s;
}

#enterScreen.fade {
    opacity: 0;
    transform: scale(1.1);
    pointer-events: none;
}

/* OVERLAY */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 1;
}

/* RAIN */
#rain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
}

/* CARD */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 420px;
    max-width: 90%;
    padding: 20px;
    border-radius: 20px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    text-align: center;
    z-index: 3;
}

#pfp {
    width: 90px;
    height: 90px;
    border-radius: 50%;
}

/* SOCIALS */
.socials img {
    width: 32px;
    margin: 5px;
    cursor: pointer;
    transition: 0.2s;
}
.socials img:hover {
    transform: scale(1.2);
    filter: drop-shadow(0 0 6px white);
}

/* MUSIC */
.player {
    margin-top: 15px;
    padding: 12px;
    border-radius: 14px;
    background: rgba(255,255,255,0.08);
}

.musicBtns {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 10px;
}

.musicBtns img {
    width: 40px;
    height: 40px;
    cursor: pointer;
}

/* VIEW */
#views {
    position: absolute;
    bottom: 10px;
    left: 10px;
    opacity: 0.7;
    z-index: 3;
}

/* DISCORD */
#discordModal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index: 9999;
}

.discordBox {
    width: 320px;
    padding: 20px;
    border-radius: 16px;
    background: rgba(20,20,20,0.95);
    text-align: center;
}
</style>
</head>

<body>

<div id="enterScreen">click to enter</div>

<div id="overlay"></div>
<canvas id="rain"></canvas>

<div class="card">

    <img id="pfp" src="https://raw.githubusercontent.com/ayytrix/thisshitscrazyy/refs/heads/main/assets/icons/profilepicture.png">

    <h2>lead</h2>
    <p>wsg its lead im just a chill guy rlly</p>

    <div class="socials">
        <a href="https://github.com/ayytrix"><img src="https://raw.githubusercontent.com/ayytrix/thisshitscrazyy/refs/heads/main/assets/icons/whitegh.png"></a>
        <a href="https://www.youtube.com/@aytr_x"><img src="https://raw.githubusercontent.com/ayytrix/thisshitscrazyy/refs/heads/main/assets/icons/yt%20icon.png"></a>
        <a onclick="openDiscord()"><img src="https://raw.githubusercontent.com/ayytrix/thisshitscrazyy/refs/heads/main/assets/icons/dcwhite.png"></a>
        <a href="https://open.spotify.com/user/31pn57izmi7wputttltz7b3lsggy"><img src="https://raw.githubusercontent.com/ayytrix/thisshitscrazyy/refs/heads/main/assets/icons/Spotify_Icon_RGB_White.png"></a>
        <a href="https://www.tiktok.com/@thetoxicchemical"><img src="https://raw.githubusercontent.com/ayytrix/thisshitscrazyy/refs/heads/main/assets/icons/image-removebg-preview(32).png"></a>
    </div>

    <div id="discord">Loading Discord...</div>

    <div class="player">
        <div id="songName">No song</div>

        <div class="musicBtns">
            <img onclick="prevSong()" src="https://raw.githubusercontent.com/ayytrix/thisshitscrazyy/refs/heads/main/assets/icons/rewind.png">
            <img onclick="togglePlay()" src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
            <img onclick="nextSong()" src="https://raw.githubusercontent.com/ayytrix/thisshitscrazyy/refs/heads/main/assets/icons/fastforward-removebg-preview.png">
        </div>
    </div>

</div>

<div id="views">Views: 0</div>

<audio id="audio"></audio>

<div id="discordModal" onclick="closeDiscord(event)">
    <div class="discordBox">
        <h2>Discord</h2>
        <p id="dcText">Loading...</p>
    </div>
</div>

<script>

let audio = document.getElementById("audio");
let started = false;

/* ENTER */
document.getElementById("enterScreen").onclick = () => {
    const enter = document.getElementById("enterScreen");

    enter.classList.add("fade");

    setTimeout(() => {
        enter.style.display = "none";
    }, 800);

    started = true;

    audio.play().catch(() => {});
    startRain();
};

/* VIEWS */
let views = localStorage.getItem("views") || 0;
views++;
localStorage.setItem("views", views);
document.getElementById("views").innerText = "Views: " + views;

/* ✅ MUSIC (FIXED + MULTIPLE SONGS) */
let songs = [
    "https://raw.githubusercontent.com/ayytrix/thisshitscrazyy/main/assets/music/Moving%20Round%20The%20Block.mp3",
    "https://raw.githubusercontent.com/ayytrix/thisshitscrazyy/main/assets/music/my%20second%20song.mp3"
];

let index = 0;

function loadSong(){
    audio.src = songs[index];
    updateSong();
}

function updateSong(){
    let name = songs[index].split("/").pop();
    name = decodeURIComponent(name);
    document.getElementById("songName").innerText = name;
}

function togglePlay(){
    if(!started) return;
    audio.paused ? audio.play().catch(()=>{}) : audio.pause();
}

function nextSong(){
    index = (index + 1) % songs.length;
    loadSong();
    if(started) audio.play().catch(()=>{});
}

function prevSong(){
    index = (index - 1 + songs.length) % songs.length;
    loadSong();
    if(started) audio.play().catch(()=>{});
}

loadSong();

/* DISCORD */
const DISCORD_ID = "1411506062623903896";

async function loadDiscord(){
    try {
        const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
        const json = await res.json();
        const d = json?.data;

        document.getElementById("discord").innerText =
            d?.discord_status || "offline";

        document.getElementById("dcText").innerText =
            d ? `User: localscript.lua\nStatus: ${d.discord_status}` : "Offline";

    } catch {
        document.getElementById("discord").innerText = "Offline";
    }
}

loadDiscord();
setInterval(loadDiscord, 5000);

/* DISCORD MODAL */
function openDiscord(){
    document.getElementById("discordModal").style.display = "flex";
}

function closeDiscord(e){
    if(e.target.id === "discordModal"){
        document.getElementById("discordModal").style.display = "none";
    }
}

/* RAIN */
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

let drops = Array(120).fill().map(()=>({
    x: Math.random()*innerWidth,
    y: Math.random()*innerHeight,
    len: Math.random()*20+10,
    speed: Math.random()*4+4
}));

function rain(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle="rgba(174,194,224,0.5)";
    ctx.lineWidth=1;

    for(let d of drops){
        ctx.beginPath();
        ctx.moveTo(d.x,d.y);
        ctx.lineTo(d.x,d.y+d.len);
        ctx.stroke();

        d.y += d.speed;

        if(d.y > canvas.height){
            d.y = -20;
            d.x = Math.random()*canvas.width;
        }
    }

    requestAnimationFrame(rain);
}

function startRain(){
    requestAnimationFrame(rain);
}

/* TITLE */
const titles = ["leads profile", "yo im lead", "im bored", "wsg"];
let i = 0;

setInterval(() => {
    document.title = titles[i];
    i = (i + 1) % titles.length;
}, 2500);

</script>

</body>
</html>
